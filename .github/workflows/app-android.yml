name: app-android

# Builds the Hestia cross-platform app for Android (Tauri 2) and uploads
# the APK as a workflow artifact — and, when triggered by an app-v* tag,
# attaches it to a GitHub Release for direct download + sideload.
#
# The APK is debug-signed (Gradle debug keystore): installable on any
# device with "install unknown apps" enabled. A Play-Store-grade signing
# config can be layered in later via secrets without changing the build.
#
# Companion to release.yml (which builds the daemon/CLI binaries).

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  android:
    name: build android apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        # NDK: the runner image's preinstalled NDK is auto-detected by the
        # tauri CLI (verified in run 27447314547 — compiled clean with it).

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      # The generated Gradle project (gen/android/buildSrc BuildTask.kt)
      # hard-invokes `cargo tauri android android-studio-script`, so the
      # RUST tauri-cli must exist as a cargo subcommand — the npm CLI is
      # not enough. Pinned to match the tauri crate version in Cargo.toml.
      - name: Install cargo tauri-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.11.2

      - name: npm ci
        working-directory: app
        run: npm ci

      - name: Build Android APK (release profile, debug-keystore signed)
        working-directory: app
        run: cargo tauri android build --apk

      - name: Stage APK with versioned name
        run: |
          APK=$(find app/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          test -n "$APK" || { echo "no APK produced"; exit 1; }
          REF="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          cp "$APK" "dist/hestia-${REF}-android-universal.apk"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hestia-android-apk
          path: dist/*.apk
          retention-days: 30

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/app-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
